<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor JPG a PDF - Conversor Universal</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 40px;
            margin: 30px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
            text-align: center;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #e8f2ff;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .upload-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
        }
        
        .upload-subtext {
            color: #666;
            font-size: 0.9rem;
        }
        
        .file-info {
            background: #e8f5e8;
            border: 1px solid #4caf50;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            display: none;
        }
        
        .file-name {
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 5px;
        }
        
        .file-size {
            color: #666;
            font-size: 0.9rem;
        }
        
        .file-count {
            font-size: 0.9rem;
            color: #2e7d32;
            margin-top: 5px;
        }
        
        .convert-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
            display: none;
            width: 100%;
        }
        
        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .download-btn {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
            display: none;
            width: 100%;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }
        
        .loading {
            display: none;
            margin: 20px 0;
            text-align: center;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        #fileInput {
            display: none;
        }
        
        .supported-formats {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .supported-formats h3 {
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .format-tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .format-tag {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .new-conversion-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            display: none;
        }
        
        .new-conversion-btn:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">
                ← Volver al Inicio
            </a>
            <h1>🖼️ Conversor JPG a PDF</h1>
            <p>Convierte imágenes JPG, JPEG y PNG a archivos PDF. Soporta múltiples imágenes (cada una en una página)</p>
        </div>
        
        <div class="content">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Selecciona una o más imágenes</div>
                <div class="upload-subtext">o arrastra los archivos aquí</div>
                <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,image/jpeg,image/png" multiple>
            </div>
            
            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
                <div class="file-count" id="fileCount"></div>
            </div>
            
            <button class="convert-btn" id="convertBtn">
                🔄 Convertir a PDF
            </button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Convirtiendo imágenes...</p>
            </div>
            
            <div class="status" id="status"></div>
            
            <button class="download-btn" id="downloadBtn">
                📥 Descargar PDF
            </button>
            
            <button class="new-conversion-btn" id="newConversionBtn">
                🔄 Nueva Conversión
            </button>
            
            <div class="supported-formats">
                <h3>Formatos soportados</h3>
                <div class="format-tags">
                    <span class="format-tag">JPG</span>
                    <span class="format-tag">JPEG</span>
                    <span class="format-tag">PNG</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const fileCount = document.getElementById('fileCount');
        const convertBtn = document.getElementById('convertBtn');
        const loading = document.getElementById('loading');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');
        const newConversionBtn = document.getElementById('newConversionBtn');
        
        let selectedFiles = [];
        let pdfBlob = null;
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files);
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFileSelect(e.dataTransfer.files);
        });
        
        convertBtn.addEventListener('click', () => convertToPDF());
        downloadBtn.addEventListener('click', () => downloadPDF());
        newConversionBtn.addEventListener('click', () => startNewConversion());
        
        function handleFileSelect(files) {
            if (!files || files.length === 0) return;
            
            const validFiles = Array.from(files).filter(f => validateFile(f));
            if (validFiles.length === 0) {
                showStatus('Ningún archivo válido. Solo se permiten JPG, JPEG y PNG (máx. 25MB cada uno).', 'error');
                return;
            }
            
            if (validFiles.length !== files.length) {
                showStatus('Algunos archivos no son válidos. Solo JPG, JPEG y PNG.', 'error');
            }
            
            selectedFiles = validFiles;
            const totalSize = validFiles.reduce((sum, f) => sum + f.size, 0);
            
            fileName.textContent = validFiles.length === 1 
                ? validFiles[0].name 
                : `${validFiles.length} archivos seleccionados`;
            fileSize.textContent = formatFileSize(totalSize);
            fileCount.textContent = validFiles.length === 1 
                ? '' 
                : `${validFiles.length} imágenes → ${validFiles.length} páginas en el PDF`;
            fileInfo.style.display = 'block';
            convertBtn.style.display = 'block';
            
            downloadBtn.style.display = 'none';
            newConversionBtn.style.display = 'none';
            status.style.display = 'none';
        }
        
        function validateFile(file) {
            const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png'];
            const allowedExtensions = ['jpg', 'jpeg', 'png'];
            const maxSize = 25 * 1024 * 1024;
            
            const ext = file.name.split('.').pop().toLowerCase();
            
            if (file.size > maxSize) return false;
            if (!allowedTypes.includes(file.type) && !allowedExtensions.includes(ext)) return false;
            
            return true;
        }
        
        async function convertToPDF() {
            if (selectedFiles.length === 0) return;
            
            convertBtn.style.display = 'none';
            loading.style.display = 'block';
            status.style.display = 'none';
            
            try {
                const pdfDoc = await PDFLib.PDFDocument.create();
                const pageWidth = 595.28;
                const pageHeight = 841.89;
                
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    const ext = file.name.split('.').pop().toLowerCase();
                    const arrayBuffer = await file.arrayBuffer();
                    const uint8Array = new Uint8Array(arrayBuffer);
                    
                    let image;
                    if (ext === 'png') {
                        image = await pdfDoc.embedPng(uint8Array);
                    } else {
                        image = await pdfDoc.embedJpg(uint8Array);
                    }
                    
                    const page = pdfDoc.addPage([pageWidth, pageHeight]);
                    const dims = image.scaleToFit(pageWidth, pageHeight);
                    
                    page.drawImage(image, {
                        x: (pageWidth - dims.width) / 2,
                        y: (pageHeight - dims.height) / 2,
                        width: dims.width,
                        height: dims.height
                    });
                }
                
                const pdfBytes = await pdfDoc.save();
                pdfBlob = new Blob([pdfBytes], { type: 'application/pdf' });
                
                showStatus('¡Imágenes convertidas a PDF exitosamente!', 'success');
                downloadBtn.style.display = 'block';
                newConversionBtn.style.display = 'block';
                
            } catch (error) {
                console.error('Error al convertir:', error);
                showStatus('Error: ' + (error.message || 'Error desconocido al convertir'), 'error');
                convertBtn.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }
        
        function downloadPDF() {
            if (!pdfBlob) return;
            
            const baseName = selectedFiles.length === 1 
                ? selectedFiles[0].name.replace(/\.[^/.]+$/, '') 
                : 'imagenes';
            const url = URL.createObjectURL(pdfBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = baseName + '.pdf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        function startNewConversion() {
            selectedFiles = [];
            pdfBlob = null;
            fileInput.value = '';
            
            fileInfo.style.display = 'none';
            convertBtn.style.display = 'none';
            downloadBtn.style.display = 'none';
            newConversionBtn.style.display = 'none';
            status.style.display = 'none';
            loading.style.display = 'none';
        }
        
        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
