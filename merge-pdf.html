<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unir PDF - Conversor Universal</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 40px;
            margin: 30px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
            text-align: center;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #e8f2ff;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .upload-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
        }
        
        .upload-subtext {
            color: #666;
            font-size: 0.9rem;
        }
        
        /* File List and Drag & Drop */
        .file-list {
            margin: 30px 0;
            display: none;
            list-style: none;
        }
        
        .file-item {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: grab;
            transition: all 0.2s ease;
            user-select: none;
        }
        
        .file-item:active {
            cursor: grabbing;
        }
        
        .file-item.dragging {
            opacity: 0.5;
            background: #e8f2ff;
            border-style: dashed;
            border-color: #667eea;
        }
        
        .file-item:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .drag-handle {
            color: #ccc;
            font-size: 1.2rem;
        }
        
        .file-icon {
            font-size: 1.5rem;
        }
        
        .file-details {
            flex: 1;
        }
        
        .file-name {
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
            word-break: break-all;
        }
        
        .file-size {
            color: #666;
            font-size: 0.8rem;
        }
        
        .remove-file {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            padding: 5px;
            font-size: 1.2rem;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .remove-file:hover {
            color: #a71d2a;
        }
        
        .actions {
            margin-top: 30px;
            display: none;
        }
        
        .convert-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: block;
        }
        
        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .convert-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .download-btn {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: none;
            margin-top: 10px;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }
        
        .new-conversion-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            display: none;
            width: 100%;
        }
        
        .new-conversion-btn:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        .loading {
            display: none;
            margin: 20px 0;
            text-align: center;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            display: none;
            text-align: center;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        #fileInput {
            display: none;
        }
        
        .supported-formats {
            margin-top: 40px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
        }
        
        .supported-formats h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        
        .tip {
            font-size: 0.85rem;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">
                ← Volver al Inicio
            </a>
            <h1>📑 Unir PDF</h1>
            <p>Combina múltiples archivos PDF en uno solo. Arrastra para reordenar.</p>
        </div>
        
        <div class="content">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">➕</div>
                <div class="upload-text">Añadir archivos PDF</div>
                <div class="upload-subtext">o arrastra los archivos aquí</div>
                <input type="file" id="fileInput" accept="application/pdf" multiple>
            </div>
            
            <ul class="file-list" id="fileList">
                <!-- Los archivos aparecerán aquí -->
            </ul>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Uniendo archivos PDF...</p>
            </div>
            
            <div class="status" id="status"></div>
            
            <div class="actions" id="actionsArea">
                <button class="convert-btn" id="mergeBtn">
                    🔄 Unir archivos PDF
                </button>
                <button class="download-btn" id="downloadBtn">
                    📥 Descargar PDF unido
                </button>
                <button class="new-conversion-btn" id="newBtn">
                    ✨ Nueva unión
                </button>
            </div>
            
            <div class="supported-formats">
                <h3>Instrucciones</h3>
                <p class="tip">💡 Arrastra los archivos para cambiar el orden en el que se unirán.</p>
            </div>
        </div>
    </div>

    <!-- pdf-lib para procesar PDFs -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const actionsArea = document.getElementById('actionsArea');
        const mergeBtn = document.getElementById('mergeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const newBtn = document.getElementById('newBtn');
        const loading = document.getElementById('loading');
        const status = document.getElementById('status');
        
        let selectedFiles = []; // Array de objetos { file, id }
        let mergedPdfBlob = null;
        let nextId = 0;
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        
        mergeBtn.addEventListener('click', mergePdfs);
        downloadBtn.addEventListener('click', downloadMergedPdf);
        newBtn.addEventListener('click', resetAll);
        
        function handleFiles(files) {
            if (!files || files.length === 0) return;
            
            const pdfFiles = Array.from(files).filter(f => f.type === 'application/pdf');
            
            if (pdfFiles.length === 0) {
                showStatus('Por favor, selecciona archivos PDF válidos.', 'error');
                return;
            }
            
            pdfFiles.forEach(file => {
                const fileObj = {
                    file: file,
                    id: nextId++
                };
                selectedFiles.push(fileObj);
                renderFileItem(fileObj);
            });
            
            updateUI();
        }
        
        function renderFileItem(fileObj) {
            const li = document.createElement('li');
            li.className = 'file-item';
            li.draggable = true;
            li.dataset.id = fileObj.id;
            
            li.innerHTML = `
                <div class="drag-handle">☰</div>
                <div class="file-icon">📄</div>
                <div class="file-details">
                    <div class="file-name">${fileObj.file.name}</div>
                    <div class="file-size">${formatFileSize(fileObj.file.size)}</div>
                </div>
                <button class="remove-file" title="Eliminar">&times;</button>
            `;
            
            // Drag and Drop Events
            li.addEventListener('dragstart', handleDragStart);
            li.addEventListener('dragend', handleDragEnd);
            
            // Remove Button
            li.querySelector('.remove-file').addEventListener('click', (e) => {
                e.stopPropagation();
                removeFile(fileObj.id);
            });
            
            fileList.appendChild(li);
        }
        
        function removeFile(id) {
            selectedFiles = selectedFiles.filter(item => item.id !== id);
            const item = fileList.querySelector(`[data-id="${id}"]`);
            if (item) item.remove();
            updateUI();
        }
        
        function updateUI() {
            if (selectedFiles.length > 0) {
                fileList.style.display = 'block';
                actionsArea.style.display = 'block';
                status.style.display = 'none';
                downloadBtn.style.display = 'none';
                newBtn.style.display = 'none';
                mergeBtn.style.display = 'block';
            } else {
                fileList.style.display = 'none';
                actionsArea.style.display = 'none';
            }
        }
        
        // --- Drag & Drop Ordering Logic ---
        let draggingElement = null;
        
        function handleDragStart(e) {
            draggingElement = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }
        
        function handleDragEnd() {
            draggingElement = null;
            this.classList.remove('dragging');
            
            // Update selectedFiles array order based on DOM
            const newOrder = Array.from(fileList.querySelectorAll('.file-item')).map(li => parseInt(li.dataset.id));
            const reorderedFiles = [];
            newOrder.forEach(id => {
                const found = selectedFiles.find(f => f.id === id);
                if (found) reorderedFiles.push(found);
            });
            selectedFiles = reorderedFiles;
        }
        
        fileList.addEventListener('dragover', (e) => {
            e.preventDefault();
            const afterElement = getDragAfterElement(fileList, e.clientY);
            if (afterElement == null) {
                fileList.appendChild(draggingElement);
            } else {
                fileList.insertBefore(draggingElement, afterElement);
            }
        });
        
        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.file-item:not(.dragging)')];
            
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }
        
        // --- PDF Merging Logic ---
        async function mergePdfs() {
            if (selectedFiles.length < 2) {
                showStatus('Selecciona al menos 2 archivos para unir.', 'error');
                return;
            }
            
            mergeBtn.disabled = true;
            loading.style.display = 'block';
            status.style.display = 'none';
            
            try {
                const { PDFDocument } = PDFLib;
                const mergedPdf = await PDFDocument.create();
                
                for (const fileObj of selectedFiles) {
                    const arrayBuffer = await fileObj.file.arrayBuffer();
                    const pdf = await PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }
                
                const pdfBytes = await mergedPdf.save();
                mergedPdfBlob = new Blob([pdfBytes], { type: 'application/pdf' });
                
                showStatus('¡Archivos unidos exitosamente!', 'success');
                mergeBtn.style.display = 'none';
                downloadBtn.style.display = 'block';
                newBtn.style.display = 'block';
                
            } catch (error) {
                console.error('Error al unir PDFs:', error);
                showStatus('Error al unir los archivos: ' + error.message, 'error');
                mergeBtn.disabled = false;
            } finally {
                loading.style.display = 'none';
            }
        }
        
        function downloadMergedPdf() {
            if (!mergedPdfBlob) return;
            
            const url = URL.createObjectURL(mergedPdfBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'pdf_unido.pdf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        function resetAll() {
            selectedFiles = [];
            mergedPdfBlob = null;
            fileList.innerHTML = '';
            fileInput.value = '';
            updateUI();
            mergeBtn.disabled = false;
        }
        
        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
